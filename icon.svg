<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Magic v Machine icon — stylised "M v M" inside a cyberpunk hex
       frame. Cyan + pink neon glow on a dark navy backdrop matching
       the game's theme. Renders cleanly from 16px to 512px+. -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0220"/>
      <stop offset="100%" stop-color="#050011"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff"/>
      <stop offset="100%" stop-color="#ff5eb9"/>
    </linearGradient>
    <filter id="neonBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Dark backdrop with rounded square corners (PWA safe-zone aware) -->
  <rect width="512" height="512" rx="76" fill="url(#bgGrad)"/>

  <!-- Outer hex frame (cyberpunk machine motif) -->
  <g filter="url(#neonBlur)" opacity="0.55">
    <polygon points="256,72 432,168 432,344 256,440 80,344 80,168"
      fill="none" stroke="#00f3ff" stroke-width="6"/>
  </g>
  <polygon points="256,72 432,168 432,344 256,440 80,344 80,168"
    fill="none" stroke="url(#strokeGrad)" stroke-width="4"/>

  <!-- Left M (Magic — cyan stroke) -->
  <g filter="url(#neonBlur)" opacity="0.7">
    <path d="M 130 320 L 130 192 L 184 256 L 238 192 L 238 320"
      fill="none" stroke="#00f3ff" stroke-width="22"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path d="M 130 320 L 130 192 L 184 256 L 238 192 L 238 320"
    fill="none" stroke="#00f3ff" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Centre v (versus) -->
  <g filter="url(#neonBlur)" opacity="0.65">
    <path d="M 230 224 L 256 286 L 282 224"
      fill="none" stroke="#ffffff" stroke-width="14"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path d="M 230 224 L 256 286 L 282 224"
    fill="none" stroke="#ffffff" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right M (Machine — pink stroke) -->
  <g filter="url(#neonBlur)" opacity="0.7">
    <path d="M 274 320 L 274 192 L 328 256 L 382 192 L 382 320"
      fill="none" stroke="#ff5eb9" stroke-width="22"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path d="M 274 320 L 274 192 L 328 256 L 382 192 L 382 320"
    fill="none" stroke="#ff5eb9" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Corner micro-circuits (machine detail) -->
  <g stroke="#00f3ff" stroke-width="2" fill="none" opacity="0.45">
    <path d="M 96 152 L 116 152 L 116 132"/>
    <path d="M 416 152 L 396 152 L 396 132"/>
    <path d="M 96 360 L 116 360 L 116 380"/>
    <path d="M 416 360 L 396 360 L 396 380"/>
  </g>
</svg>
